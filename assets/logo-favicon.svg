<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 48 48">
  <circle cx="24" cy="24" r="24" fill="#0b0f1e"/>
  <!-- perspective grid lines radiating from vanishing point -->
  <line x1="24" y1="38" x2="2"  y2="44" stroke="#00e5ff" stroke-width="0.5" opacity="0.25"/>
  <line x1="24" y1="38" x2="10" y2="44" stroke="#00e5ff" stroke-width="0.5" opacity="0.25"/>
  <line x1="24" y1="38" x2="18" y2="44" stroke="#00e5ff" stroke-width="0.5" opacity="0.25"/>
  <line x1="24" y1="38" x2="30" y2="44" stroke="#00e5ff" stroke-width="0.5" opacity="0.25"/>
  <line x1="24" y1="38" x2="38" y2="44" stroke="#00e5ff" stroke-width="0.5" opacity="0.25"/>
  <line x1="24" y1="38" x2="46" y2="44" stroke="#00e5ff" stroke-width="0.5" opacity="0.25"/>
  <!-- horizontal grid cross-lines -->
  <line x1="4"  y1="43"   x2="44" y2="43"   stroke="#00e5ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="7"  y1="41.5" x2="41" y2="41.5" stroke="#00e5ff" stroke-width="0.4" opacity="0.15"/>
  <!-- mountain body -->
  <polygon points="24,7 4,38 44,38" fill="#1a3a5c"/>
  <!-- snow cap -->
  <polygon points="24,7 18,20 30,18" fill="#c5d1dc"/>
  <!-- neon outline -->
  <polyline points="4,38 24,7 44,38" fill="none" stroke="#00e5ff" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- base line -->
  <line x1="4" y1="38" x2="44" y2="38" stroke="#00e5ff" stroke-width="1" opacity="0.5"/>
  <!-- snow line -->
  <line x1="18" y1="20" x2="30" y2="18" stroke="#00e5ff" stroke-width="0.8" opacity="0.6"/>
</svg>
 
